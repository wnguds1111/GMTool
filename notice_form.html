<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Admin Tools - 공지 관리</title>
    <!-- Pretendard Font for perfect modern Korean typography -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #5282FF;
            --admin-tools-blue: #3b82f6;
            --sidebar-bg: #F0F4F9;
            --main-bg: #FFFFFF;
            --text-dark: #1e293b;
            --text-gray: #475569;
            --border-color: #E2E8F0;
            --label-bg: #F8FAFC;
            --white: #ffffff;
            --logout-bg: #A6B2CB;
            --active-bg: #E8F0FE;
            --header-green: #669CA3; /* From the screenshot header */
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
        }
        body {
            display: flex;
            height: 100vh;
            color: var(--text-dark);
            background-color: var(--sidebar-bg);
            overflow: hidden;
            font-size: 15px;
        }
        /* --- Left Navigation Area (Omitted for brevity, kept exactly same) --- */
        .left-panel { width: 320px; display: flex; flex-direction: column; background-color: var(--sidebar-bg); }
        .logo-header { height: 64px; display: flex; align-items: center; padding: 0 20px; background-color: var(--sidebar-bg); }
        .logo-header .logo-img { height: 24px; object-fit: contain; margin-right: 6px; }
        .logo-header .logo-text { font-weight: 700; font-size: 17px; color: var(--admin-tools-blue); display: flex; align-items: center; letter-spacing: -0.3px; }
        .logo-header .divider { color: #D1D5DB; margin: 0 12px; font-weight: 300; }
        .logo-header .lang-selector { font-size: 15px; font-weight: 600; color: var(--text-dark); display: flex; align-items: center; gap: 4px; }
        .lang-selector i { color: #9CA3AF; font-size: 16px; }
        .sidebars-container { display: flex; flex: 1; overflow: hidden; }
        .primary-sidebar { width: 80px; background-color: var(--primary-blue); display: flex; flex-direction: column; align-items: center; padding-top: 24px; gap: 16px; border-top-right-radius: 20px; }
        .primary-nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--white); font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; width: 60px; height: 60px; border-radius: 12px; text-decoration: none; }
        .primary-nav-item i { font-size: 22px; margin-bottom: 6px; }
        .primary-nav-item.active { background-color: var(--white); color: var(--primary-blue); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .primary-nav-item:hover:not(.active) { background-color: rgba(255,255,255,0.1); }
        .secondary-sidebar { flex: 1; background-color: var(--sidebar-bg); padding: 24px 0; overflow-y: auto; }
        .user-profile { display: flex; justify-content: space-between; align-items: center; font-size: 17px; font-weight: 700; color: var(--text-dark); margin-bottom: 24px; padding: 0 20px; }
        .btn-logout { background-color: var(--logout-bg); color: var(--white); border: none; border-radius: 12px; padding: 4px 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .sub-nav-group { margin-bottom: 8px; padding: 0 12px; }
        .sub-nav-header { padding: 12px 16px; font-size: 15px; font-weight: 700; color: var(--admin-tools-blue); display: flex; justify-content: space-between; align-items: center; cursor: pointer; background-color: var(--white); border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .sub-nav-header.collapsed { background-color: transparent; color: var(--text-dark); box-shadow: none; }
        .sub-nav-header i { font-size: 14px; color: inherit; }
        .sub-nav-list { list-style: none; padding: 8px 0; }
        .sub-nav-item { padding: 10px 16px 10px 32px; font-size: 15px; color: var(--text-gray); cursor: pointer; font-weight: 500; display: flex; align-items: center; }
        .sub-nav-item i { margin-right: 8px; font-size: 14px; }
        .sub-nav-item:hover { color: var(--admin-tools-blue); }
        .sub-nav-item.active { color: var(--admin-tools-blue); font-weight: 700; }
        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: var(--main-bg);
            border-top-left-radius: 20px;
            box-shadow: -4px 0 15px rgba(0,0,0,0.03);
        }
        .breadcrumb { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
        .breadcrumb i { color: #CBD5E1; font-size: 14px; }
        /* Buttons */
        .btn { padding: 8px 20px; font-size: 15px; font-weight: 600; border-radius: 6px; cursor: pointer; border: 1px solid transparent; }
        .btn-primary { background-color: var(--admin-tools-blue); color: var(--white); }
        .btn-primary:hover { background-color: #2563EB; }
        .btn-secondary { background-color: #94A3B8; color: var(--white); border-radius: 4px; padding: 6px 16px; }
        .btn-outline { border: 1px solid var(--border-color); background: var(--white); color: var(--text-dark); }
        .btn-icon { background: var(--admin-tools-blue); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .btn-icon.disabled { background: #E2E8F0; color: #94A3B8; cursor: not-allowed; }
        /* List View */
        .list-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .list-search { display: flex; align-items: center; gap: 8px; }
        .list-search select { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; }
        .list-search input { padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; width: 200px; outline: none; }
        .data-table { width: 100%; border-collapse: collapse; text-align: center; }
        .data-table th { background-color: var(--label-bg); padding: 14px 8px; font-size: 15px; font-weight: 700; color: var(--text-dark); border-bottom: 1px solid var(--border-color); }
        .data-table td { padding: 16px 8px; font-size: 15px; color: var(--text-dark); border-bottom: 1px solid var(--border-color); }
        .data-table tr:hover { background-color: #F8FAFC; }
        /* Form View */
        .form-header-bar { margin-bottom: 20px; }
        .form-section-title { background-color: var(--header-green); color: white; padding: 12px 20px; font-weight: 700; border-radius: 4px; margin-bottom: 20px; }
        .form-group-title { font-size: 17px; font-weight: 700; margin: 30px 0 15px 0; display: flex; align-items: center; }
        .form-group-title::after { content: "*"; color: red; margin-left: 4px; }
        .form-table { width: 100%; border-collapse: collapse; border-top: 1px solid var(--border-color); margin-bottom: 20px; }
        .form-table td { border-bottom: 1px solid var(--border-color); padding: 16px; }
        .form-table .label-cell { width: 150px; font-weight: 700; color: var(--text-dark); }
        .form-table .label-cell::after { content: "*"; color: red; margin-left: 4px; }
        .form-table .input-cell { background-color: var(--white); }
        .form-control { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 4px; outline: none; font-size: 15px; transition: border-color 0.2s; }
        .form-control:focus { border-color: var(--admin-tools-blue); }
        .form-control.short { width: auto; min-width: 150px; }
        /* Language Tabs */
        .lang-tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .lang-tab { flex: 1; min-width: 80px; text-align: center; padding: 10px; border: 1px solid var(--admin-tools-blue); border-radius: 6px; cursor: pointer; color: var(--admin-tools-blue); font-weight: 600; transition: all 0.2s; }
        .lang-tab.active { background-color: var(--admin-tools-blue); color: white; }
        .lang-tab:hover:not(.active) { background-color: #EBF3FF; }
        .radio-group { display: flex; gap: 20px; align-items: center; }
        .radio-label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-weight: 500; }
        .radio-label input[type="radio"] { cursor: pointer; width: 16px; height: 16px; accent-color: var(--admin-tools-blue); }
        .form-actions { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        textarea.form-control { min-height: 200px; resize: vertical; }
    
        .page-lnb {
            display: flex;
            gap: 24px;
            border-bottom: 1px solid #CBD5E1;
            margin-bottom: 24px;
            padding-bottom: 0;
            margin-top: 16px;
        }
        .page-lnb-item {
            font-size: 16px;
            font-weight: 700;
            color: #94A3B8;
            padding-bottom: 12px;
            cursor: pointer;
            text-decoration: none;
            position: relative;
        }
        .page-lnb-item.active {
            color: var(--admin-tools-blue);
        }
        .page-lnb-item.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--admin-tools-blue);
        }
        .page-lnb-item:hover:not(.active) {
            color: #475569;
        }
    </style>
</head>
<body>
    <!-- Left Panel -->
    <div class="left-panel">
        <div class="logo-header">
            <img src="gravity_logo.png" alt="GRAVITY" class="logo-img" onerror="this.src='https://stage-admin.mygnjoy.com/_next/image?url=%2Fimages%2Fgravity.png&w=384&q=75'">
            <div class="logo-text" style="cursor:pointer;" onclick="location.href='index.html'">Admin Tools</div>
            <div class="divider">|</div>
            <div class="lang-selector">
                <i class="fa-solid fa-earth-americas"></i>
                KO <i class="fa-solid fa-chevron-down" style="font-size: 12px; margin-left: 2px;"></i>
            </div>
        </div>
        <div class="sidebars-container">
            <!-- Primary Blue Sidebar -->
            <div class="primary-sidebar">
                <a href="#" class="primary-nav-item"><i class="fa-solid fa-user"></i>MEM</a>
                <a href="#" class="primary-nav-item"><i class="fa-solid fa-gamepad"></i>GAME</a>
                <a href="#" class="primary-nav-item"><i class="fa-solid fa-sack-dollar"></i>PAY</a>
                <a href="#" class="primary-nav-item active"><i class="fa-solid fa-globe"></i>WEB</a>
                <a href="#" class="primary-nav-item"><i class="fa-solid fa-gear"></i>SET</a>
            </div>
            <!-- Secondary Gray Sidebar -->
            <div class="secondary-sidebar">
                <div class="user-profile">
                    이주형
                    <button class="btn-logout">로그아웃</button>
                </div>
                <div class="sub-nav-group"><div class="sub-nav-header collapsed">공통 관리<i class="fa-solid fa-chevron-down"></i></div></div>
                <div class="sub-nav-group"><div class="sub-nav-header collapsed">GNJOY 관리<i class="fa-solid fa-chevron-down"></i></div></div>
                <div class="sub-nav-group"><div class="sub-nav-header collapsed">라그나로크 제로<i class="fa-solid fa-chevron-down"></i></div></div>
                <div class="sub-nav-group"><div class="sub-nav-header collapsed">RO FACTORY 관리<i class="fa-solid fa-chevron-down"></i></div></div>
                <div class="sub-nav-group">
                    <div class="sub-nav-header">GetPoring<i class="fa-solid fa-chevron-up"></i></div>
                    <ul class="sub-nav-list">
                        <li class="sub-nav-item" onclick="location.href='prereg.html'">사전예약 관리</li>
                        <li class="sub-nav-item active" onclick="location.href='notice.html'">공지 관리</li>
                        <li class="sub-nav-item" onclick="location.href='maintenance.html'">점검 관리</li>
                        <li class="sub-nav-item" onclick="location.href='mail_all.html'">우편 관리</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <!-- Main Content -->
    <div class="main-content">
        <!-- Form View -->
        <div>
        <div >
            
        <div class="page-lnb">
            <a href="notice.html" class="page-lnb-item active">공지 관리</a>
            <a href="template.html" class="page-lnb-item">템플릿 관리</a>
        </div>
        <div class="form-header-bar">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <button class="btn btn-secondary" onclick="location.href='notice.html'">뒤로가기</button>
                    <button class="btn btn-outline" style="border-color: var(--admin-tools-blue); color: var(--admin-tools-blue);" onclick="alert('템플릿 불러오기 기능 (준비중)')"><i class="fa-solid fa-file-import" style="margin-right:6px;"></i>템플릿 불러오기</button>
                </div>
            </div>
            <div class="form-section-title">등록/수정</div>
            <div class="form-group-title" style="margin-top:0;">기본 정보</div>
            <table class="form-table">
                <tr>
                    <td class="label-cell">공지 구분</td>
                    <td class="input-cell">
                        <select class="form-control short">
                            <option value="1">일반</option>
                            <option value="2">점검</option>
                            <option value="3">이벤트</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td class="label-cell">노출기간</td>
                    <td class="input-cell">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input type="datetime-local" class="form-control short">
                            <span>~</span>
                            <input type="datetime-local" class="form-control short">
                        </div>
                    </td>
                </tr>
            </table>
            <div class="form-group-title">언어별 정보</div>
            <div class="lang-tabs">
                <div class="lang-tab active">EN</div>
                <div class="lang-tab">ZH-CN</div>
                <div class="lang-tab">DE</div>
                <div class="lang-tab">FR</div>
                <div class="lang-tab">ID</div>
                <div class="lang-tab">TH</div>
                <div class="lang-tab">TR</div>
                <div class="lang-tab">ES</div>
            </div>
            <table class="form-table">
                <tr>
                    <td class="label-cell">제목</td>
                    <td class="input-cell">
                        <input type="text" class="form-control" placeholder="최대 100자 까지 입력해주세요">
                    </td>
                </tr>
                <tr>
                    <td class="label-cell">본문</td>
                    <td class="input-cell">
                        <textarea class="form-control" placeholder="공지사항 본문을 입력해주세요"></textarea>
                    </td>
                </tr>
            </table>
            <div class="form-group-title">사용 정보</div>
            <table class="form-table">
                <tr>
                    <td class="label-cell">게시 여부</td>
                    <td class="input-cell">
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="publish" checked> 게시</label>
                            <label class="radio-label"><input type="radio" name="publish"> 미게시</label>
                        </div>
                    </td>
                </tr>
            </table>
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="location.href='notice.html'">취소</button>
                <button class="btn btn-primary" onclick="alert('등록되었습니다.'); location.href='notice.html'">등록하기</button>
            </div>
        </div>
    </div>
    <script>
        // Tab click behavior
        document.querySelectorAll('.lang-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
