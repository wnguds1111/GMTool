    <script src="https://cdn.tailwindcss.com"></script>
    <script src="tailwind-init.js"></script>
    <style>
        /* blob 애니메이션 — Tailwind keyframe으로 대체 불가한 custom */
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(30px) scale(1.05); } }
        .blob-float { animation: float 10s ease-in-out infinite alternate; }
        .blob-float-reverse { animation: float 12s ease-in-out infinite alternate-reverse; }
        /* 링크 화살표 트랜지션 */
        .portal-link:hover .arrow { color: #0284c7; transform: translateX(5px); }
    </style>
</head>
